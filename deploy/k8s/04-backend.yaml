apiVersion: v1
kind: Service
metadata:
  name: quanta-backend
  namespace: quanta
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: quanta-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quanta-backend
  namespace: quanta
spec:
  selector:
    matchLabels:
      app: quanta-backend
  template:
    metadata:
      labels:
        app: quanta-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/wacobjilson/quanta-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quanta-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://quanta:$(POSTGRES_PASSWORD)@quanta-postgres:5432/quanta?sslmode=disable"
            - name: REDIS_URL
              value: "redis://quanta-redis:6379/0"
            - name: API_PORT
              value: "8080"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://quanta.example.com"
            # Single-user mode: removes login/register. Set "false" to require auth.
            - name: DISABLE_AUTH
              value: "true"
            - name: QUOTE_POLL_INTERVAL
              value: "5s"
            - name: AI_PROVIDER
              value: "anthropic"
            - name: ANTHROPIC_MODEL
              value: "claude-opus-4-8"
          envFrom:
            - secretRef:
                name: quanta-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quanta-backend
  namespace: quanta
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quanta-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
