apiVersion: v1
kind: Service
metadata:
  name: quanta-redis
  namespace: quanta
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: quanta-redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quanta-redis
  namespace: quanta
spec:
  serviceName: quanta-redis
  replicas: 1
  selector:
    matchLabels:
      app: quanta-redis
  template:
    metadata:
      labels:
        app: quanta-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
