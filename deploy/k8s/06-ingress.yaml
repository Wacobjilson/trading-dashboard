apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quanta
  namespace: quanta
  annotations:
    # Uncomment for NGINX ingress (WebSocket-friendly timeouts):
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: traefik
  rules:
    - host: quanta.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: quanta-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: quanta-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quanta-frontend
                port:
                  number: 3000
