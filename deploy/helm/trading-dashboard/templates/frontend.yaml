apiVersion: v1
kind: Service
metadata:
  name: {{ include "quanta.fullname" . }}-frontend
  labels:
    {{- include "quanta.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "quanta.fullname" . }}-frontend
  labels:
    {{- include "quanta.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: frontend
        {{- include "quanta.labels" . | nindent 8 }}
    spec:
      containers:
        - name: frontend
          # The image is host-agnostic: the browser talks to the backend via
          # same-origin /api and /ws through the ingress, so no NEXT_PUBLIC_*
          # build args or runtime env are required here.
          image: {{ include "quanta.image" (dict "Values" .Values "component" .Values.frontend.image "tag" .Values.frontend.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
