{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "quanta.fullname" . }}-secrets
  labels:
    {{- include "quanta.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secret.values.JWT_SECRET | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.values.POSTGRES_PASSWORD | quote }}
  POLYGON_API_KEY: {{ .Values.secret.values.POLYGON_API_KEY | quote }}
  FINNHUB_API_KEY: {{ .Values.secret.values.FINNHUB_API_KEY | quote }}
  ALPHAVANTAGE_API_KEY: {{ .Values.secret.values.ALPHAVANTAGE_API_KEY | quote }}
  TWELVEDATA_API_KEY: {{ .Values.secret.values.TWELVEDATA_API_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secret.values.ANTHROPIC_API_KEY | quote }}
{{- end }}
