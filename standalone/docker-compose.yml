# Quanta standalone — one-command build & deploy.
#   cp .env.example .env   # (optional) add your API keys; set QUANTA_PORT if 8000 is taken
#   docker compose up -d --build
#   open http://localhost:${QUANTA_PORT:-8000}
services:
  quanta:
    build: .
    image: quanta-standalone:latest
    container_name: quanta
    ports:
      # Host port is configurable (set QUANTA_PORT in .env if 8000 is in use);
      # the container always listens on 8000 internally.
      - "${QUANTA_PORT:-8000}:8000"
    # .env is optional — without keys it runs in synthetic/mock demo mode.
    env_file:
      - path: .env
        required: false
    environment:
      # open positions + custom price alerts persist here (bind-mounted below)
      QUANTA_DATA: /data
      # AI research analyst: the host's local Ollama (Docker Desktop proxies
      # host.docker.internal to host loopback). Override in .env if remote.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    restart: unless-stopped
