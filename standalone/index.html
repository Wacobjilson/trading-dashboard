<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quanta Terminal</title>
<style>
  :root {
    --bg:#0a0e14; --panel:#0f141c; --panelAlt:#131a24; --border:#1e2733;
    --text:#c9d4e0; --muted:#6b7787; --amber:#f5a623; --up:#2ecc71; --down:#ff4d4f; --accent:#3b82f6;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:Inter,system-ui,Segoe UI,sans-serif; }
  .mono { font-family:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; }
  header { display:flex; align-items:center; justify-content:space-between;
    padding:8px 16px; border-bottom:1px solid var(--border); background:var(--panel); }
  .brand { color:var(--amber); font-weight:700; letter-spacing:.3px; }
  .sub { color:var(--muted); font-size:12px; margin-left:8px; }
  .status { color:var(--muted); font-size:12px; }
  main { padding:16px; }
  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:0 0 8px; }
  .grid { display:grid; gap:8px; grid-template-columns:repeat(2,1fr); margin-bottom:24px; }
  @media(min-width:640px){ .grid{ grid-template-columns:repeat(3,1fr);} }
  @media(min-width:1024px){ .grid{ grid-template-columns:repeat(6,1fr);} }
  .tile { position:relative; background:var(--panel); border:1px solid var(--border);
    border-radius:6px; padding:10px 12px; overflow:hidden; }
  .tile .bar { position:absolute; left:0; top:0; bottom:0; width:3px; }
  .tile .row { display:flex; align-items:baseline; justify-content:space-between; }
  .tile .sym { font-weight:600; }
  .tile .price { font-size:18px; margin-top:4px; }
  .tile .name { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  table { width:100%; border-collapse:collapse; font-size:13px;
    border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  thead { background:var(--panelAlt); }
  th { text-align:left; padding:8px 12px; font-size:11px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--muted); cursor:pointer; user-select:none; white-space:nowrap; }
  th:hover { color:var(--text); }
  td { padding:8px 12px; border-top:1px solid var(--border); white-space:nowrap; }
  tbody tr:hover { background:rgba(19,26,36,.5); }
  .up { color:var(--up); } .down { color:var(--down); } .muted { color:var(--muted); }
  .amber { color:var(--amber); }
  .trend { display:inline-flex; align-items:center; gap:6px; }
  .track { width:60px; height:6px; background:var(--border); border-radius:3px; }
  .fill { height:6px; border-radius:3px; }
  .flash-up { animation:fu .6s ease-out; } .flash-down { animation:fd .6s ease-out; }
  @keyframes fu { 0%{background:rgba(46,204,113,.25)} 100%{background:transparent} }
  @keyframes fd { 0%{background:rgba(255,77,79,.25)} 100%{background:transparent} }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }
</style>
</head>
<body>
<header>
  <div><span class="brand">QUANTA</span><span class="sub">TERMINAL · standalone</span></div>
  <div class="status" id="status">connecting…</div>
</header>
<main>
  <h2>Market Overview</h2>
  <div class="grid" id="tiles"></div>
  <h2>Watch Grid</h2>
  <table>
    <thead><tr id="head"></tr></thead>
    <tbody id="body"></tbody>
  </table>
</main>

<script>
// Same-origin when served by quanta.py; falls back to localhost when opened as a file://
const API = (location.protocol === "file:") ? "http://localhost:8000" : "";
const REFRESH_MS = 4000;

const COLS = [
  { key:"symbol", label:"Symbol", render:(q)=>`<div><div style="font-weight:600">${q.symbol}</div><div class="name">${q.name||""}</div></div>` },
  { key:"last", label:"Last", num:true, cls:"mono", render:(q)=>`<span class="mono" data-price="${q.symbol}">${fmt(q.last)}</span>` },
  { key:"change", label:"Chg", num:true, render:(q)=>`<span class="mono ${dir(q.change)}">${signed(q.change)}</span>` },
  { key:"changePercent", label:"Chg %", num:true, render:(q)=>`<span class="mono ${dir(q.changePercent)}">${pct(q.changePercent)}</span>` },
  { key:"weekChangePct", label:"Wk %", num:true, render:(q)=>`<span class="mono ${dir(q.weekChangePct)}">${pct(q.weekChangePct)}</span>` },
  { key:"volume", label:"Volume", num:true, render:(q)=>`<span class="mono muted">${vol(q.volume)}</span>` },
  { key:"relVolume", label:"RVOL", num:true, render:(q)=>`<span class="mono ${q.relVolume>=1.5?'amber':'muted'}">${q.relVolume?q.relVolume.toFixed(2)+'x':'—'}</span>` },
  { key:"atr", label:"ATR", num:true, render:(q)=>`<span class="mono muted">${fmt(q.atr)}</span>` },
  { key:"trendStrength", label:"Trend", num:true, render:(q)=>trend(q.trendStrength) },
];

let sortKey = "symbol", sortDir = 1;
const lastPrices = {};

function fmt(n){ return (n==null||isNaN(n))?"—":Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function signed(n){ if(n==null||isNaN(n))return"—"; return (n>0?"+":"")+fmt(n); }
function pct(n){ if(n==null||isNaN(n))return"—"; return (n>0?"+":"")+Number(n).toFixed(2)+"%"; }
function vol(n){ if(!n)return"—"; const a=Math.abs(n); if(a>=1e9)return(n/1e9).toFixed(2)+"B"; if(a>=1e6)return(n/1e6).toFixed(2)+"M"; if(a>=1e3)return(n/1e3).toFixed(1)+"K"; return ""+n; }
function dir(n){ if(n==null||n===0)return"muted"; return n>0?"up":"down"; }
function trend(v){ v=Math.max(0,Math.min(100,v||0)); const c=v>=60?"var(--up)":v>=35?"var(--amber)":"var(--down)";
  return `<span class="trend"><span class="track"><span class="fill" style="width:${v}%;background:${c}"></span></span><span class="mono muted" style="font-size:11px">${v.toFixed(0)}</span></span>`; }

function renderHead(){
  document.getElementById("head").innerHTML = COLS.map(c=>{
    const arrow = sortKey===c.key ? (sortDir>0?" ▲":" ▼") : "";
    return `<th data-key="${c.key}">${c.label}${arrow}</th>`;
  }).join("");
  document.querySelectorAll("#head th").forEach(th=>th.onclick=()=>{
    const k=th.dataset.key; if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; }
    renderHead(); renderBody(window._quotes||[]);
  });
}

function renderTiles(quotes){
  document.getElementById("tiles").innerHTML = quotes.map(q=>{
    const up=(q.changePercent||0)>=0;
    return `<div class="tile">
      <div class="bar" style="background:${up?'var(--up)':'var(--down)'}"></div>
      <div class="row"><span class="sym">${q.symbol}</span><span class="mono ${dir(q.changePercent)}">${pct(q.changePercent)}</span></div>
      <div class="price mono">${fmt(q.last)}</div>
      <div class="name">${q.name||""}</div>
    </div>`;
  }).join("");
}

function renderBody(quotes){
  const rows=[...quotes].sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(typeof x==="string"){ return x.localeCompare(y)*sortDir; }
    return ((x||0)-(y||0))*sortDir;
  });
  document.getElementById("body").innerHTML = rows.map(q=>
    "<tr>"+COLS.map(c=>`<td>${c.render(q)}</td>`).join("")+"</tr>").join("");
  // price flash
  quotes.forEach(q=>{
    const el=document.querySelector(`[data-price="${q.symbol}"]`);
    if(el && lastPrices[q.symbol]!=null && q.last!==lastPrices[q.symbol]){
      el.classList.add(q.last>lastPrices[q.symbol]?"flash-up":"flash-down");
      setTimeout(()=>el.classList.remove("flash-up","flash-down"),600);
    }
    lastPrices[q.symbol]=q.last;
  });
}

async function tick(){
  try{
    const res=await fetch(`${API}/api/quotes`);
    const data=await res.json();
    window._quotes=data.quotes;
    renderTiles(data.quotes);
    renderBody(data.quotes);
    const age=data.updated?Math.max(0,Math.floor(Date.now()/1000-data.updated)):"?";
    const mock=data.quotes.some(q=>q.source==="mock");
    document.getElementById("status").innerHTML =
      `<span class="dot" style="background:var(--up)"></span>provider: <b>${data.provider}</b>${mock?' (mock fallback active)':''} · updated ${age}s ago`;
  }catch(e){
    document.getElementById("status").innerHTML =
      `<span class="dot" style="background:var(--down)"></span>can't reach quanta.py at ${API||location.origin} — is it running?`;
  }
}

renderHead();
tick();
setInterval(tick, REFRESH_MS);
</script>
</body>
</html>
